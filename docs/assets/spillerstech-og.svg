<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Spillers Technology</title>
  <desc id="desc">Operational software, tailored to the work</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08080a"/>
      <stop offset="0.58" stop-color="#101015"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientTransform="translate(160 120) rotate(35) scale(510 390)">
      <stop stop-color="#e8bd72" stop-opacity=".2"/>
      <stop offset="1" stop-color="#e8bd72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientTransform="translate(1060 460) rotate(-145) scale(470 360)">
      <stop stop-color="#ad90ff" stop-opacity=".2"/>
      <stop offset="1" stop-color="#ad90ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#ffe2a9"/>
      <stop offset=".47" stop-color="#e8bd72"/>
      <stop offset=".78" stop-color="#efb5c6"/>
      <stop offset="1" stop-color="#ad90ff"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
    <pattern id="grain" width="110" height="110" patternUnits="userSpaceOnUse">
      <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/></filter>
      <rect width="110" height="110" filter="url(#noise)" opacity=".045"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#goldGlow)"/>
  <rect width="1200" height="630" fill="url(#violetGlow)"/>
  <rect width="1200" height="630" fill="url(#grain)" opacity=".45"/>

  <path d="M1200 0H902L704 315l206 315h290Z" fill="#fff" opacity=".018"/>
  <path d="M1200 0H1002L808 315l199 315h193" fill="none" stroke="#f8f3eb" stroke-opacity=".11" stroke-width="1"/>
  <path d="M0 540h1200" stroke="#f8f3eb" stroke-opacity=".14"/>

  <g transform="translate(72 68)">
    <path d="M0 16 35 3l35 13-9 58H9Z" fill="#e8bd72" fill-opacity=".08" stroke="#e8bd72" stroke-width="1.5"/>
    <text x="35" y="51" fill="#f8f3eb" font-family="Georgia, serif" font-size="25" font-weight="bold" text-anchor="middle">ST</text>
    <path d="M53 16h5v5h-5Z" fill="#ffe2a9" transform="rotate(45 55.5 18.5)"/>
    <text x="93" y="35" fill="#f8f3eb" font-family="Georgia, serif" font-size="27" font-weight="bold">Spillers Technology</text>
    <text x="94" y="60" fill="#aaa39a" font-family="Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="2.5">INDEPENDENT SOFTWARE STUDIO</text>
  </g>

  <text x="72" y="254" fill="#f8f3eb" font-family="Georgia, serif" font-size="75" letter-spacing="-3">Operational software,</text>
  <text x="72" y="344" fill="url(#metal)" font-family="Georgia, serif" font-size="78" font-style="italic" letter-spacing="-3">tailored to the work.</text>
  <rect x="72" y="384" width="520" height="1" fill="url(#metal)"/>

  <text x="72" y="438" fill="#c8c1b7" font-family="Arial, sans-serif" font-size="21">Focused tools for MSPs and internal IT teams.</text>

  <g transform="translate(72 491)" font-family="Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="1.4">
    <rect width="150" height="38" rx="19" fill="#e8bd72" fill-opacity=".1" stroke="#e8bd72" stroke-opacity=".65"/>
    <text x="75" y="24" fill="#ffe2a9" text-anchor="middle">SELF-HOSTABLE</text>
    <rect x="164" width="160" height="38" rx="19" fill="#ad90ff" fill-opacity=".1" stroke="#ad90ff" stroke-opacity=".65"/>
    <text x="244" y="24" fill="#d6c9ff" text-anchor="middle">PUBLIC SOURCE</text>
    <rect x="338" width="166" height="38" rx="19" fill="#74d4b5" fill-opacity=".08" stroke="#74d4b5" stroke-opacity=".65"/>
    <text x="421" y="24" fill="#a6efd8" text-anchor="middle">HUMAN SUPPORT</text>
  </g>

  <g fill="#e8bd72">
    <path d="m1080 112 5 13 13 5-13 5-5 13-5-13-13-5 13-5Z" opacity=".9"/>
    <path d="m1008 185 2.5 7 7 2.5-7 2.5-2.5 7-2.5-7-7-2.5 7-2.5Z" opacity=".55"/>
  </g>

  <text x="1128" y="592" fill="#8f8991" font-family="Arial, sans-serif" font-size="13" letter-spacing="1.5" text-anchor="end">SPILLERSTECH.US</text>
</svg>
